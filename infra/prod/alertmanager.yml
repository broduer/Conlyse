global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # Configure your notification channel here.
    # Examples below — uncomment and fill in one:

    # Email:
    # email_configs:
    #   - to: example@gmail.com
    #     from: alertmanager@conlyse.example.com
    #     smarthost: smtp.gmail.com:587
    #     auth_username: example@gmail.com
    #     auth_password: your-app-password

    # Webhook (e.g. Discord, Slack, custom endpoint):
    # webhook_configs:
    #   - url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
