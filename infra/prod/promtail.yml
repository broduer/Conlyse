server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.docker.compose.project=infra"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container_name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_id]
        target_label: container_id

    pipeline_stages:
      # server_converter and server_observer both emit JSON log lines.
      # Parse the JSON to extract fields as Loki labels / structured metadata.
      - json:
          expressions:
            level: level
            logger: logger
            game_id: game_id
            player_id: player_id
      - labels:
          level:
          game_id:
          player_id:
